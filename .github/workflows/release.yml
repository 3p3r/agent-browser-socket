name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: agent-browser-socket-linux-x64
          - name: Linux ARM64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            binary: agent-browser-socket-linux-arm64
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: agent-browser-socket-windows.exe
          - name: macOS x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: agent-browser-socket-darwin-x64
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: agent-browser-socket-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxtst-dev \
            libxfixes-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libxcb1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            libudev-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/agent-browser-socket artifacts/${{ matrix.binary }}
          chmod +x artifacts/${{ matrix.binary }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item target/${{ matrix.target }}/release/agent-browser-socket.exe artifacts/${{ matrix.binary }}
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: artifacts/${{ matrix.binary }}
          retention-days: 7

  release:
    name: Merge Release Binaries
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded artifacts
        run: |
          find artifacts -type f | sort

      - name: Create macOS universal binary
        run: |
          mkdir -p bin
          lipo -create \
            artifacts/agent-browser-socket-darwin-x64/agent-browser-socket-darwin-x64 \
            artifacts/agent-browser-socket-darwin-arm64/agent-browser-socket-darwin-arm64 \
            -output bin/agent-browser-socket-mac
          chmod +x bin/agent-browser-socket-mac
          lipo -info bin/agent-browser-socket-mac

      - name: Create Linux self-extracting wrapper
        run: |
          mkdir -p /tmp/abs-linux-payload
          cp artifacts/agent-browser-socket-linux-x64/agent-browser-socket-linux-x64 /tmp/abs-linux-payload/
          cp artifacts/agent-browser-socket-linux-arm64/agent-browser-socket-linux-arm64 /tmp/abs-linux-payload/
          chmod +x /tmp/abs-linux-payload/agent-browser-socket-linux-x64
          chmod +x /tmp/abs-linux-payload/agent-browser-socket-linux-arm64

          cat > bin/agent-browser-socket-linux <<'WRAPPER'
          #!/usr/bin/env sh
          set -eu

          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64)
              BIN="agent-browser-socket-linux-x64"
              ;;
            aarch64|arm64)
              BIN="agent-browser-socket-linux-arm64"
              ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac

          SELF="$0"
          PAYLOAD_LINE="$(awk '/^__ABS_LINUX_PAYLOAD__$/ { print NR + 1; exit }' "$SELF")"
          if [ -z "${PAYLOAD_LINE:-}" ]; then
            echo "Corrupt launcher: missing payload marker" >&2
            exit 1
          fi

          TMPDIR="$(mktemp -d "${TMPDIR:-/tmp}/abs-linux.XXXXXX")"
          trap 'rm -rf "$TMPDIR"' EXIT INT TERM

          tail -n +"$PAYLOAD_LINE" "$SELF" | tar -xzf - -C "$TMPDIR"
          chmod +x "$TMPDIR/$BIN"
          exec "$TMPDIR/$BIN" "$@"
          __ABS_LINUX_PAYLOAD__
          WRAPPER

          tar -czf /tmp/agent-browser-socket-linux-payload.tgz -C /tmp/abs-linux-payload .
          cat /tmp/agent-browser-socket-linux-payload.tgz >> bin/agent-browser-socket-linux
          chmod +x bin/agent-browser-socket-linux
          rm -f /tmp/agent-browser-socket-linux-payload.tgz

      - name: Finalize Windows binary
        run: |
          cp artifacts/agent-browser-socket-windows.exe/agent-browser-socket-windows.exe \
            bin/agent-browser-socket-windows.exe

      - name: Verify release binaries
        run: |
          ls -la bin/
          test -f bin/agent-browser-socket-mac
          test -f bin/agent-browser-socket-linux
          test -f bin/agent-browser-socket-windows.exe
          grep -q '^__ABS_LINUX_PAYLOAD__$' bin/agent-browser-socket-linux

      - name: Upload universal binaries for testing
        uses: actions/upload-artifact@v4
        with:
          name: universal-binaries
          path: |
            bin/agent-browser-socket-mac
            bin/agent-browser-socket-linux
            bin/agent-browser-socket-windows.exe
          retention-days: 7

  test-binaries:
    name: Test ${{ matrix.name }}
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            binary: agent-browser-socket-linux
          - name: Linux ARM64
            os: ubuntu-22.04-arm
            binary: agent-browser-socket-linux
          - name: macOS x64
            os: macos-latest
            binary: agent-browser-socket-mac
          - name: macOS ARM64
            os: macos-latest
            binary: agent-browser-socket-mac
          - name: Windows x64
            os: windows-latest
            binary: agent-browser-socket-windows.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - uses: actions/download-artifact@v4
        with:
          name: universal-binaries
          path: bin/

      - name: Make binary executable
        if: runner.os != 'Windows'
        run: chmod +x bin/${{ matrix.binary }}

      - name: Run binary smoke tests
        run: npm run test:binary -- bin/${{ matrix.binary }}

  publish-nightly:
    name: Publish Nightly Draft Release
    needs:
      - release
      - test-binaries
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: universal-binaries
          path: bin/

      - name: Upsert draft release
        run: |
          TAG="nightly"
          if gh release view "$TAG" &>/dev/null; then
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" \
            --title "Nightly (draft)" \
            --draft \
            --prerelease \
            --notes "Nightly auto-build from \`main\` (${GITHUB_SHA::7})" \
            bin/agent-browser-socket-mac \
            bin/agent-browser-socket-linux \
            bin/agent-browser-socket-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
