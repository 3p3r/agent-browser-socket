name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: agent-browser-socket-linux-x64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: agent-browser-socket-linux-arm64
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: agent-browser-socket-win32-x64.exe
          - name: macOS x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: agent-browser-socket-darwin-x64
          - name: macOS ARM64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: agent-browser-socket-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxtst-dev \
            libxfixes-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libxcb1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            libudev-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/agent-browser-socket artifacts/${{ matrix.binary }}
          chmod +x artifacts/${{ matrix.binary }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item target/${{ matrix.target }}/release/agent-browser-socket.exe artifacts/${{ matrix.binary }}
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: artifacts/${{ matrix.binary }}
          retention-days: 7

  release:
    name: Draft Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect binaries
        run: |
          mkdir -p bin
          find artifacts -type f -name 'agent-browser-socket-*' -exec mv {} bin/ \;
          chmod +x bin/agent-browser-socket-* 2>/dev/null || true
          echo "Binaries:" && ls -la bin/

      - name: Upsert draft release
        run: |
          TAG="latest"
          if gh release view "$TAG" &>/dev/null; then
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" \
            --title "Latest (draft)" \
            --draft \
            --prerelease \
            --notes "Auto-built from \`main\` ($(git rev-parse --short HEAD))" \
            bin/agent-browser-socket-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
